<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Coach Sandra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#c0616a; --accentSoft:#e7a7ab; --accentBg:#f7e7e8;
    --cream:#fbf6f1; --card:#fff; --ink:#4a3b3c; --inkSoft:#9a8688;
    --line:#efe2dd; --green:#9bb98c; --gold:#d9b15a; --leaf:#9ec3a0;
    --nav:74px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Cormorant Garamond',serif}
  .wrap{max-width:460px;margin:0 auto;padding-bottom:calc(var(--nav) + 20px)}
  button{font-family:inherit}
  input,select{font-family:inherit}
  .pad{padding:0 16px}

  /* header */
  .head{padding:24px 16px 12px;text-align:center}
  .head .brand{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accentSoft);font-weight:600}
  .head .title{font-size:30px;color:var(--accent);margin-top:2px;font-weight:600}
  .head .sub{font-size:13px;color:var(--inkSoft);text-transform:capitalize}

  /* sub-tabs (alimentation) */
  .subtabs{display:flex;gap:8px;padding:0 16px;margin-bottom:14px}
  .subtab{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--inkSoft);border-radius:14px;padding:10px;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
  .subtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* recap */
  .recap{background:var(--card);border-radius:22px;padding:18px;border:1px solid var(--line);box-shadow:0 6px 22px rgba(192,97,106,.06)}
  .recap-row{display:flex;align-items:center;gap:16px}
  .ring{position:relative;width:116px;height:116px;flex-shrink:0}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .kcal{font-size:28px;line-height:1;color:var(--accent);font-weight:600}
  .ring .goal{font-size:11px;color:var(--inkSoft)}
  .pills{display:flex;gap:8px}
  .pill{flex:1;background:var(--accentBg);border-radius:14px;padding:8px 10px;text-align:center}
  .pill .l{font-size:11px;color:var(--accent);font-weight:600}
  .pill .v{font-size:22px;color:var(--ink);font-weight:600;line-height:1.1}
  .pill .u{font-size:10px;color:var(--inkSoft)}
  .macros{margin-top:12px;display:flex;flex-direction:column;gap:9px}
  .macro .top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px}
  .macro .bar{height:6px;background:#f1eae6;border-radius:99px;overflow:hidden}
  .macro .fill{height:100%;border-radius:99px;transition:width .6s ease}

  /* add block */
  .add{margin-top:16px;background:var(--card);border-radius:22px;padding:16px;border:1px solid var(--line)}
  .add .q{font-size:13px;font-weight:600;color:var(--inkSoft);margin-bottom:10px}
  .moments{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .mbtn{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:10px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s}
  .mbtn .e{font-size:18px}
  .mbtn span{font-size:11.5px;font-weight:600}
  .mbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .addbtn{margin-top:12px;width:100%;border:none;cursor:pointer;background:var(--accentBg);color:var(--accent);font-weight:700;font-size:15px;border-radius:14px;padding:13px;display:flex;align-items:center;justify-content:center;gap:8px}

  /* day list */
  .empty{text-align:center;padding:38px 20px;color:var(--inkSoft)}
  .empty .big{font-size:34px}
  .empty .t{font-size:19px;color:var(--accent);margin-top:4px}
  .empty .s{font-size:13px;margin-top:2px}
  .section{margin-bottom:16px}
  .sec-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 6px}
  .sec-title{font-size:20px;color:var(--accent);font-weight:600}
  .sec-tot{font-size:13px;color:var(--inkSoft);font-weight:600}
  .entries{display:flex;flex-direction:column;gap:8px}
  .e-col{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
  .e-col .emo{font-size:18px}
  .e-col .nom{flex:1;font-size:14.5px;font-weight:600}
  .e-col .qte{font-size:12px;color:var(--inkSoft)}
  .e-col .kcal{font-size:13px;color:var(--accent);font-weight:700}
  .chev{color:var(--accentSoft);font-weight:700}
  .e-open{background:var(--card);border:1.5px solid var(--accentSoft);border-radius:16px;padding:14px}
  .e-open .r1{display:flex;align-items:center;gap:10px}
  .e-open .emo{font-size:20px}
  .e-open .nom{flex:1;font-size:15px;font-weight:700}
  .xbtn{border:none;background:none;cursor:pointer;color:var(--inkSoft);padding:4px;display:flex;font-size:15px}
  .e-open .r2{display:flex;align-items:center;gap:10px;margin-top:12px}
  .stepper{display:flex;align-items:center;background:var(--accentBg);border-radius:12px;overflow:hidden}
  .stepper button{border:none;background:transparent;color:var(--accent);cursor:pointer;padding:10px 12px;display:flex;font-size:16px;line-height:1}
  .stepper .val{min-width:58px;text-align:center;font-weight:700;font-size:14px;color:var(--accent)}
  .stepper .val small{font-weight:500;font-size:12px;color:var(--inkSoft)}
  .e-open .kc{flex:1;text-align:right;font-size:14px;font-weight:700;color:var(--accent)}
  .okbtn{border:none;background:var(--accent);color:#fff;border-radius:12px;padding:9px 14px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:5px;font-size:13px}

  /* poids */
  .card{background:var(--card);border-radius:22px;padding:18px;border:1px solid var(--line)}
  .obj-row{display:flex;align-items:center;justify-content:space-between}
  .obj-now{text-align:center}
  .obj-now .n{font-size:40px;color:var(--accent);font-weight:600;line-height:1}
  .obj-now .u{font-size:13px;color:var(--inkSoft)}
  .obj-arrow{font-size:22px;color:var(--accentSoft)}
  .progress{height:10px;background:#f1eae6;border-radius:99px;margin-top:16px;overflow:hidden}
  .progress .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .6s}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--inkSoft);margin-top:6px}
  .wadd{display:flex;gap:8px;margin-top:16px}
  .wadd input{flex:1;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px;background:var(--card);color:var(--ink);outline:none;text-align:center}
  .wadd button{border:none;background:var(--accent);color:#fff;border-radius:14px;padding:0 20px;cursor:pointer;font-weight:700;font-size:15px}
  .wlist{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .wrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .wrow .d{flex:1;font-size:13.5px;color:var(--inkSoft);text-transform:capitalize}
  .wrow .k{font-size:15px;font-weight:700;color:var(--ink)}

  /* ingred */
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .search{position:relative;flex:1}
  .search input{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 36px 11px 36px;font-size:15px;background:var(--card);color:var(--ink);outline:none}
  .search .ic{position:absolute;left:11px;top:11px;color:var(--inkSoft)}
  .search .clr{position:absolute;right:7px;top:7px;border:none;background:var(--accentBg);border-radius:8px;padding:5px 7px;cursor:pointer;color:var(--accent)}
  .createbtn{border:none;background:var(--accent);color:#fff;border-radius:14px;padding:0 16px;cursor:pointer;font-weight:700;font-size:14px;white-space:nowrap}
  .cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px}
  .cats button{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--inkSoft);border-radius:99px;padding:6px 13px;cursor:pointer;font-size:12.5px;font-weight:600}
  .cats button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
  .icard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;cursor:pointer}
  .icard .emo{font-size:24px}
  .icard .nom{font-size:14px;font-weight:700;margin-top:4px;color:var(--ink);line-height:1.2}
  .icard .sub{font-size:11.5px;color:var(--inkSoft);margin-top:2px}
  .icard .kc{font-size:12px;color:var(--accent);font-weight:700;margin-top:6px}
  .icard .del{position:absolute;top:8px;right:8px;border:none;background:var(--accentBg);color:var(--accent);border-radius:8px;padding:4px 7px;cursor:pointer;font-size:12px}
  .icard .star{position:absolute;top:8px;left:8px;font-size:13px}

  /* generic list item (bank sheet) */
  .list{display:flex;flex-direction:column;gap:8px}
  .li{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;width:100%}
  .li .emo{font-size:22px}
  .li .nom{font-size:14.5px;font-weight:600;color:var(--ink)}
  .li .sub{font-size:11.5px;color:var(--inkSoft)}
  .li .plus{color:var(--accent);font-size:20px;font-weight:700;margin-left:auto}
  .noresult{text-align:center;color:var(--inkSoft);padding:24px 0;font-size:14px}

  /* recettes placeholder */
  .placeholder{text-align:center;padding:50px 24px;color:var(--inkSoft)}
  .placeholder .big{font-size:46px}
  .placeholder .t{font-size:24px;color:var(--accent);margin-top:10px;font-weight:600}
  .placeholder .s{font-size:14px;margin-top:8px;line-height:1.5}

  /* bottom nav */
  .bottomnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:40}
  .bottomnav .inner{max-width:460px;margin:0 auto;width:100%;display:flex}
  .navbtn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--inkSoft);padding-top:8px}
  .navbtn .e{font-size:21px}
  .navbtn .l{font-size:11px;font-weight:600}
  .navbtn.on{color:var(--accent)}

  /* sheet */
  .overlay{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .scrim{position:absolute;inset:0;background:rgba(74,59,60,.4)}
  .sheet{position:relative;width:100%;max-width:460px;background:var(--cream);border-radius:26px 26px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:sheetIn .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-head{padding:14px 16px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .backbtn{border:none;background:var(--accentBg);border-radius:10px;padding:7px 11px;cursor:pointer;color:var(--accent);font-size:16px;line-height:1}
  .sheet-title{font-size:20px;color:var(--accent);font-weight:600}
  .sheet-body{overflow-y:auto;padding:16px}

  .newdish{width:100%;margin-bottom:14px;border:1.5px dashed var(--accentSoft);background:#fff;color:var(--accent);border-radius:14px;padding:12px;cursor:pointer;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px}
  .fav-label{font-size:12px;font-weight:700;color:var(--inkSoft);margin-bottom:7px;display:flex;align-items:center;gap:5px}
  .favs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .favs button{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:7px 12px;cursor:pointer;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:5px}

  /* qty sheet */
  .qty-hero{text-align:center;padding:6px 0 4px}
  .qty-hero .emo{font-size:44px}
  .qty-hero .nom{font-size:24px;color:var(--accent);font-weight:600}
  .qty-hero .sub{font-size:13px;color:var(--inkSoft)}
  .chips{display:flex;justify-content:center;gap:8px;margin:18px 0}
  .chip{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:12px 0;width:62px;cursor:pointer;font-weight:700;font-size:16px}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .bigstep{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px}
  .bigstep button{border:none;background:var(--accentBg);border-radius:12px;color:var(--accent);cursor:pointer;padding:10px 14px;font-size:20px;line-height:1}
  .bigstep .v{font-size:30px;color:var(--ink);font-weight:600;min-width:110px;text-align:center}
  .bigstep .v small{font-size:15px;color:var(--inkSoft)}
  .kcalpreview{text-align:center;font-size:15px;color:var(--accent);font-weight:700;margin-bottom:16px}
  .cta{width:100%;border:none;background:var(--accent);color:#fff;border-radius:16px;padding:15px;cursor:pointer;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}

  /* editor */
  .field{margin-bottom:11px}
  .field label{font-size:12px;color:var(--inkSoft);display:block;margin-bottom:4px;font-weight:600}
  .field input,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:15px;background:var(--card);color:var(--ink);outline:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .unitchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .unitchips button{border:1px solid var(--line);background:var(--card);color:var(--inkSoft);border-radius:99px;padding:5px 11px;cursor:pointer;font-size:12.5px}
  .unitchips button.on{background:var(--accentBg);color:var(--accent);border-color:var(--accentSoft);font-weight:700}
  .favtoggle{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;font-size:14px;margin-bottom:11px}
  .delbtn{width:100%;border:1px solid #e6b3b0;background:#fdeceb;color:#b3433f;border-radius:14px;padding:12px;cursor:pointer;font-weight:700;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div id="screen"></div>
</div>

<!-- Bottom nav -->
<nav class="bottomnav">
  <div class="inner" id="nav"></div>
</nav>

<!-- Sheet -->
<div class="overlay" id="overlay">
  <div class="scrim" id="scrim"></div>
  <div class="sheet">
    <div class="sheet-head">
      <button class="backbtn" id="sheetBack">‹</button>
      <div class="sheet-title" id="sheetTitle"></div>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<script>
/* ============ DONNÉES ============ */
const GOALS = {kcal:1500, prot:70, gluc:180, lip:55, fib:25};
const WEIGHT = {start:41, target:46};
const MOMENTS = [
  {key:"pdj",  short:"Pdj",  e:"☕", title:"Petit-déjeuner"},
  {key:"dej",  short:"Déj",  e:"☀️", title:"Déjeuner"},
  {key:"coll", short:"Coll", e:"🍪", title:"Collation"},
  {key:"diner",short:"Dîner",e:"🌙", title:"Dîner"},
];
const CATS = ["Tous","Goûter","Fruits","Laitiers","Protéines","Féculents","Plats","Condiments"];
const UNIT_SUGGEST = ["pièce","portion","100g","verre","pot","tranche","bol","poignée","c. à s.","c. à c.","gourde"];
const QTY_CHIPS = [0.5,1,1.5,2];
let _id = 1; const nid = ()=>_id++;

let bank = [
  {id:nid(),nom:"Gourde de compote",emoji:"🍎",unite:"gourde",cat:"Goûter",fav:true,kcal:90,prot:0,gluc:22,lip:0,fib:1.5},
  {id:nid(),nom:"Yaourt nature",emoji:"🥛",unite:"pot",cat:"Laitiers",fav:true,kcal:60,prot:4,gluc:6,lip:3,fib:0},
  {id:nid(),nom:"Banane",emoji:"🍌",unite:"pièce",cat:"Fruits",fav:true,kcal:105,prot:1,gluc:27,lip:0,fib:3},
  {id:nid(),nom:"Œuf",emoji:"🥚",unite:"pièce",cat:"Protéines",fav:true,kcal:78,prot:6,gluc:0,lip:5,fib:0},
  {id:nid(),nom:"Tranche de pain",emoji:"🍞",unite:"tranche",cat:"Féculents",fav:true,kcal:80,prot:3,gluc:15,lip:1,fib:1},
  {id:nid(),nom:"Cannelloni au thon",emoji:"🐟",unite:"portion",cat:"Plats",fav:false,kcal:430,prot:26,gluc:42,lip:17,fib:3},
  {id:nid(),nom:"Amandes",emoji:"🌰",unite:"poignée",cat:"Goûter",fav:true,kcal:160,prot:6,gluc:5,lip:14,fib:3},
  {id:nid(),nom:"Lait entier",emoji:"🥛",unite:"verre",cat:"Laitiers",fav:false,kcal:120,prot:6,gluc:9,lip:6,fib:0},
  {id:nid(),nom:"Fromage",emoji:"🧀",unite:"portion",cat:"Laitiers",fav:false,kcal:110,prot:7,gluc:0,lip:9,fib:0},
  {id:nid(),nom:"Huile d'olive",emoji:"🫒",unite:"c. à s.",cat:"Condiments",fav:false,kcal:90,prot:0,gluc:0,lip:10,fib:0},
  {id:nid(),nom:"Riz cuit",emoji:"🍚",unite:"bol",cat:"Féculents",fav:false,kcal:200,prot:4,gluc:44,lip:0,fib:1},
  {id:nid(),nom:"Poulet rôti",emoji:"🍗",unite:"portion",cat:"Plats",fav:false,kcal:220,prot:30,gluc:0,lip:11,fib:0},
  {id:nid(),nom:"Fondant chocolat maison",emoji:"🍫",unite:"portion",cat:"Plats",fav:false,kcal:350,prot:9,gluc:25,lip:25,fib:5},
];
let journal = {pdj:[],dej:[],coll:[],diner:[]};
let weights = [
  {d:"2026-05-02",kg:41.0},{d:"2026-05-11",kg:41.3},
  {d:"2026-05-19",kg:41.6},{d:"2026-05-27",kg:42.1},
];

/* ============ ÉTAT UI ============ */
let state = { tab:"alim", sub:"journee" };
let moment = null;
let ingSearch = "", ingCat = "Tous";
let bankSearch = "", bankCat = "Tous";

/* ============ UTILS ============ */
const fmt = n => { const r=Math.round(n*10)/10; return Number.isInteger(r)?String(r):String(r); };
const sum = (arr,k) => arr.reduce((a,e)=>a+(e[k]||0)*e.qte,0);
const allEntries = () => Object.values(journal).flat();
const esc = s => (s||"").replace(/"/g,"&quot;");
const frDate = iso => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});

/* ============ ROUTER ============ */
const screen = document.getElementById("screen");
function renderApp(){
  renderNav();
  if(state.tab==="poids") renderPoids();
  else if(state.tab==="recettes") renderRecettes();
  else renderAlim();
  window.scrollTo(0,0);
}
function renderNav(){
  const tabs=[
    {k:"poids",e:"⚖️",l:"Poids"},
    {k:"alim",e:"🍽️",l:"Alimentation"},
    {k:"recettes",e:"📖",l:"Recettes"},
  ];
  document.getElementById("nav").innerHTML = tabs.map(t=>
    `<button class="navbtn ${state.tab===t.k?'on':''}" data-tab="${t.k}">
       <span class="e">${t.e}</span><span class="l">${t.l}</span></button>`).join("");
  document.querySelectorAll(".navbtn").forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; renderApp(); });
}

/* ============ POIDS ============ */
function renderPoids(){
  const cur = weights.length?weights[weights.length-1].kg:WEIGHT.start;
  const gained = cur-WEIGHT.start, toGo=WEIGHT.target-cur;
  const pct = Math.max(0,Math.min(1,(cur-WEIGHT.start)/(WEIGHT.target-WEIGHT.start)));
  screen.innerHTML = `
    <div class="head">
      <div class="brand">🌸 Coach Sandra</div>
      <div class="title serif">Mon poids</div>
      <div class="sub">Objectif prise de poids saine</div>
    </div>
    <div class="pad">
      <div class="card">
        <div class="obj-row">
          <div class="obj-now"><div class="n serif">${fmt(cur)}</div><div class="u">kg aujourd'hui</div></div>
          <div class="obj-arrow">→</div>
          <div class="obj-now"><div class="n serif" style="color:var(--green)">${WEIGHT.target}</div><div class="u">objectif</div></div>
        </div>
        <div class="progress"><div class="fill" style="width:${pct*100}%"></div></div>
        <div class="prog-label">
          <span>Départ ${WEIGHT.start} kg</span>
          <span>${gained>=0?"+"+fmt(gained):fmt(gained)} kg · reste ${fmt(toGo)} kg</span>
        </div>
        <div class="wadd">
          <input id="wInput" type="number" inputmode="decimal" step="0.1" placeholder="Poids du jour (kg)">
          <button id="wSave">Ajouter</button>
        </div>
      </div>
      ${weights.length?`<div style="margin-top:16px">${chartSVG()}</div>`:""}
      <div class="wlist">
        ${[...weights].reverse().map((w,i)=>`
          <div class="wrow"><span class="d">${frDate(w.d)}</span><span class="k">${fmt(w.kg)} kg</span>
            <button class="xbtn" data-delw="${weights.length-1-i}">✕</button></div>`).join("")}
      </div>
    </div>`;
  document.getElementById("wSave").onclick=()=>{
    const v=parseFloat(document.getElementById("wInput").value.replace(",","."));
    if(!v||v<=0) return;
    const today=new Date().toISOString().slice(0,10);
    const ex=weights.findIndex(w=>w.d===today);
    if(ex>=0) weights[ex].kg=v; else weights.push({d:today,kg:v});
    weights.sort((a,b)=>a.d.localeCompare(b.d));
    renderApp();
  };
  document.querySelectorAll("[data-delw]").forEach(b=>b.onclick=()=>{ weights.splice(+b.dataset.delw,1); renderApp(); });
}
function chartSVG(){
  const W=428,H=130,P=22;
  const ks=weights.map(w=>w.kg).concat([WEIGHT.target,WEIGHT.start]);
  let mn=Math.min(...ks)-0.5, mx=Math.max(...ks)+0.5;
  const x=i=>P+(weights.length<2?0:i*(W-2*P)/(weights.length-1));
  const y=v=>H-P-((v-mn)/(mx-mn))*(H-2*P);
  const pts=weights.map((w,i)=>`${x(i)},${y(w.kg)}`).join(" ");
  const ty=y(WEIGHT.target);
  return `<div class="card" style="padding:14px">
    <svg width="100%" viewBox="0 0 ${W} ${H}">
      <line x1="${P}" y1="${ty}" x2="${W-P}" y2="${ty}" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="5 5"/>
      <text x="${W-P}" y="${ty-6}" text-anchor="end" font-size="11" fill="var(--green)">objectif ${WEIGHT.target}kg</text>
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${weights.map((w,i)=>`<circle cx="${x(i)}" cy="${y(w.kg)}" r="4" fill="var(--accent)"/>`).join("")}
    </svg></div>`;
}

/* ============ ALIMENTATION (Journée + Ingréd) ============ */
function renderAlim(){
  screen.innerHTML = `

      <div class="brand">🌸 Coach Sandra</div>
      <div class="title serif">Alimentation</div>
      <div class="sub" id="alimSub"></div>
    </div>

  else { document.getElementById("alimSub").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}); renderJournee(); }

function renderJournee(){
  const body=document.getElementById("alimBody");
  const t={kcal:sum(allEntries(),"kcal"),prot:sum(allEntries(),"prot"),gluc:sum(allEntries(),"gluc"),lip:sum(allEntries(),"lip"),fib:sum(allEntries(),"fib")};
  const pct=Math.min(1,t.kcal/GOALS.kcal), R=46,CIRC=2*Math.PI*R,off=CIRC*(1-pct);
  const restant=Math.max(0,GOALS.kcal-Math.round(t.kcal));
  const repas=MOMENTS.filter(m=>journal[m.key].length).length;
  const macros=[
    {e:"💪",n:"Protéines",v:t.prot,g:GOALS.prot,c:"var(--accent)"},
    {e:"🌾",n:"Glucides",v:t.gluc,g:GOALS.gluc,c:"var(--gold)"},
    {e:"🥑",n:"Lipides",v:t.lip,g:GOALS.lip,c:"var(--green)"},
    {e:"🌿",n:"Fibres",v:t.fib,g:GOALS.fib,c:"var(--leaf)"},
  ];
  const dayHTML = MOMENTS.some(m=>journal[m.key].length)
    ? `<div style="margin-top:18px">${MOMENTS.filter(m=>journal[m.key].length).map(m=>{
        const tot=Math.round(sum(journal[m.key],"kcal"));
        return `<div class="section">
          <div class="sec-head"><div class="sec-title serif">${m.title}</div><div class="sec-tot">${tot} kcal</div></div>
          <div class="entries">${journal[m.key].map(e=>entryHTML(m.key,e)).join("")}</div></div>`;
      }).join("")}</div>`
    : `<div class="empty"><div class="big">🍽️</div><div class="t serif">Rien encore aujourd'hui</div><div class="s">Choisis un moment ci-dessous pour commencer.</div></div>`;

  body.innerHTML = `
    <div class="recap"><div class="recap-row">
      <div class="ring">
        <svg width="116" height="116" viewBox="0 0 116 116">
          <circle cx="58" cy="58" r="${R}" fill="none" stroke="var(--accentBg)" stroke-width="11"/>
          <circle cx="58" cy="58" r="${R}" fill="none" stroke="var(--accent)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 58 58)" stroke-dasharray="${CIRC}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)"/>
        </svg>
        <div class="ctr"><div class="kcal serif">${Math.round(t.kcal)}</div><div class="goal">/ ${GOALS.kcal} kcal</div></div>
      </div>
      <div style="flex:1">
        <div class="pills">
          <div class="pill"><div class="l">Restant</div><div class="v serif">${restant}</div><div class="u">kcal</div></div>
          <div class="pill"><div class="l">Repas</div><div class="v serif">${repas}</div><div class="u">pris</div></div>
        </div>
        <div class="macros">${macros.map(m=>{const p=Math.min(1,m.v/m.g)*100;return `<div class="macro"><div class="top"><span>${m.e} ${m.n}</span><span style="color:var(--inkSoft)">${fmt(m.v)}g <span style="opacity:.6">/ ${m.g}g</span></span></div><div class="bar"><div class="fill" style="width:${p}%;background:${m.c}"></div></div></div>`;}).join("")}</div>
      </div></div></div>

    <div class="add">
      <div class="q">1. C'est pour quel moment&nbsp;?</div>
      <div class="moments">${MOMENTS.map(m=>`<button class="mbtn ${moment===m.key?'on':''}" data-m="${m.key}"><span class="e">${m.e}</span><span>${m.short}</span></button>`).join("")}</div>
      ${moment?`<button class="addbtn" id="openBank">＋ 2. Ajouter un aliment</button>`:""}
    </div>
    ${dayHTML}`;

  body.querySelectorAll(".mbtn").forEach(b=>b.onclick=()=>{ moment=b.dataset.m; renderJournee(); });
  const ob=document.getElementById("openBank"); if(ob) ob.onclick=()=>openSheet("bank");
  body.querySelectorAll("[data-toggle]").forEach(n=>n.onclick=()=>toggle(n.dataset.mk,+n.dataset.eid));
  body.querySelectorAll("[data-remove]").forEach(n=>n.onclick=(e)=>{e.stopPropagation();remove(n.dataset.mk,+n.dataset.eid);});
  body.querySelectorAll("[data-minus]").forEach(n=>n.onclick=(e)=>{e.stopPropagation();setQte(n.dataset.mk,+n.dataset.eid,-0.5);});
  body.querySelectorAll("[data-plus]").forEach(n=>n.onclick=(e)=>{e.stopPropagation();setQte(n.dataset.mk,+n.dataset.eid,+0.5);});
}
function entryHTML(mk,e){
  const kcal=Math.round(e.kcal*e.qte);
  if(e.collapsed) return `<div class="e-col" data-toggle data-mk="${mk}" data-eid="${e.eid}"><span class="chev">›</span><span class="emo">${e.emoji}</span><span class="nom">${e.nom}</span><span class="qte">${fmt(e.qte)} ${e.unite}</span><span class="kcal">${kcal} kcal</span></div>`;
  return `<div class="e-open"><div class="r1"><span class="emo">${e.emoji}</span><span class="nom">${e.nom}</span><button class="xbtn" data-remove data-mk="${mk}" data-eid="${e.eid}">✕</button></div>
    <div class="r2"><div class="stepper"><button data-minus data-mk="${mk}" data-eid="${e.eid}">−</button><div class="val">${fmt(e.qte)} <small>${e.unite}</small></div><button data-plus data-mk="${mk}" data-eid="${e.eid}">＋</button></div>
    <div class="kc">${kcal} kcal</div><button class="okbtn" data-toggle data-mk="${mk}" data-eid="${e.eid}">✓ OK</button></div></div>`;
}
function addEntry(a,qte){ journal[moment].push({...a,eid:nid(),qte,collapsed:false}); renderApp(); }
function remove(mk,eid){ journal[mk]=journal[mk].filter(e=>e.eid!==eid); renderApp(); }
function setQte(mk,eid,d){ journal[mk]=journal[mk].map(e=>e.eid===eid?{...e,qte:Math.max(0.5,e.qte+d)}:e); renderApp(); }
function toggle(mk,eid){ journal[mk]=journal[mk].map(e=>e.eid===eid?{...e,collapsed:!e.collapsed}:e); renderApp(); }

/* ---- Ingréd ---- */
function renderIngred(){
  const body=document.getElementById("alimBody");
  body.innerHTML = `
    <div class="toolbar">
      <div class="search">
        <span class="ic">🔍</span>
        <input id="ingSearch" placeholder="Rechercher…" value="${esc(ingSearch)}">
        <button class="clr" id="ingClear" style="display:${ingSearch?'block':'none'}">✕</button>
      </div>
      <button class="createbtn" id="ingCreate">＋ Créer</button>
    </div>
    <div class="cats" id="ingCats">${CATS.map(c=>`<button class="${ingCat===c?'on':''}" data-cat="${c}">${c}</button>`).join("")}</div>
    <div id="ingList"></div>`;
  const si=document.getElementById("ingSearch");
  si.oninput=()=>{ ingSearch=si.value; if(ingCat!=="Tous"){ingCat="Tous";document.querySelectorAll("#ingCats button").forEach(b=>b.classList.toggle("on",b.dataset.cat==="Tous"));} updateIngList(); document.getElementById("ingClear").style.display=ingSearch?"block":"none"; };
  document.getElementById("ingClear").onclick=()=>{ ingSearch=""; renderIngred(); };
  document.getElementById("ingCreate").onclick=()=>openEditor(null,false);
  document.querySelectorAll("#ingCats button").forEach(b=>b.onclick=()=>{ ingCat=b.dataset.cat; ingSearch=""; renderIngred(); });
  updateIngList();
}
function updateIngList(){
  const list=document.getElementById("ingList"); if(!list) return;
  const f=bank.filter(a=>(ingCat==="Tous"||a.cat===ingCat)&&a.nom.toLowerCase().includes(ingSearch.toLowerCase()));
  list.innerHTML = f.length?`<div class="igrid">${f.map(a=>`
    <div class="icard" data-edit="${a.id}">
      ${a.fav?'<span class="star">⭐</span>':''}
      <button class="del" data-del="${a.id}">✕</button>
      <div class="emo">${a.emoji}</div>
      <div class="nom">${a.nom}</div>
      <div class="sub">1 ${a.unite} · ${a.cat}</div>
      <div class="kc">${a.kcal} kcal · ${fmt(a.prot)}g prot</div>
    </div>`).join("")}</div>`
    : `<div class="noresult">Aucun ingrédient. Crée-le avec « ＋ Créer ».</div>`;
  list.querySelectorAll("[data-edit]").forEach(c=>c.onclick=(e)=>{ if(e.target.closest("[data-del]"))return; openEditor(bank.find(a=>a.id==c.dataset.edit),false); });
  list.querySelectorAll("[data-del]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); if(confirm("Supprimer cet ingrédient ?")){ bank=bank.filter(a=>a.id!=b.dataset.del); renderApp(); } });
}

/* ============ SHEETS ============ */
const overlay=document.getElementById("overlay");
let sheet=null, qtyTarget=null, editorState=null;
document.getElementById("scrim").onclick=closeSheet;
document.getElementById("sheetBack").onclick=()=>{
  if(sheet==="qty"||sheet==="editor"){ if(editorState&&editorState.fromBank){openSheet("bank");return;} if(sheet==="qty"){openSheet("bank");return;} }
  closeSheet();
};
function openSheet(w){ sheet=w; overlay.classList.add("show");
  if(w==="bank")renderBank(); if(w==="qty")renderQty(); if(w==="editor")renderEditor(); }
function closeSheet(){ sheet=null;qtyTarget=null;editorState=null;overlay.classList.remove("show"); }

function renderBank(){
  const mLabel=(MOMENTS.find(m=>m.key===moment)||{}).title||"";
  document.getElementById("sheetTitle").textContent="Ajouter · "+mLabel;
  const favs=bank.filter(a=>a.fav).slice(0,6);
  const f=bank.filter(a=>(bankCat==="Tous"||a.cat===bankCat)&&a.nom.toLowerCase().includes(bankSearch.toLowerCase()));
  document.getElementById("sheetBody").innerHTML=`
    <div class="search" style="margin-bottom:12px">
      <span class="ic">🔍</span>
      <input id="bankSearch" placeholder="Rechercher un aliment…" value="${esc(bankSearch)}">
      <button class="clr" id="bankClear" style="display:${bankSearch?'block':'none'}">✕</button>
    </div>
    <button class="newdish" id="newDish">✨ Nouvel aliment / plat</button>
    ${(!bankSearch&&bankCat==="Tous"&&favs.length)?`<div class="fav-label">⭐ Favoris</div><div class="favs">${favs.map(a=>`<button data-pick="${a.id}"><span>${a.emoji}</span> ${a.nom}</button>`).join("")}</div>`:""}
    <div class="cats">${CATS.map(c=>`<button class="${bankCat===c?'on':''}" data-cat="${c}">${c}</button>`).join("")}</div>
    <div class="list">${f.length?f.map(a=>`<button class="li" data-pick="${a.id}"><span class="emo">${a.emoji}</span><div><div class="nom">${a.nom}</div><div class="sub">1 ${a.unite} · ${a.kcal} kcal</div></div><span class="plus">＋</span></button>`).join(""):`<div class="noresult">Aucun résultat. Crée-le ✨</div>`}</div>`;
  const si=document.getElementById("bankSearch");
  si.oninput=()=>{ bankSearch=si.value; bankCat="Tous"; renderBank(); const s=document.getElementById("bankSearch"); s.focus(); s.setSelectionRange(s.value.length,s.value.length); };
  si.onfocus=()=>{ if(bankCat!=="Tous"){ bankCat="Tous"; renderBank(); document.getElementById("bankSearch").focus(); } };
  document.getElementById("bankClear").onclick=()=>{ bankSearch=""; renderBank(); };
  document.getElementById("newDish").onclick=()=>openEditor(null,true);
  document.querySelectorAll(".cats [data-cat]").forEach(b=>b.onclick=()=>{ bankCat=b.dataset.cat; bankSearch=""; renderBank(); });
  document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{ qtyTarget=bank.find(a=>a.id==b.dataset.pick); openSheet("qty"); });
}

function renderQty(){
  const a=qtyTarget; let qte=1;
  document.getElementById("sheetTitle").textContent="Quelle quantité ?";
  const body=document.getElementById("sheetBody");
  function draw(){
    body.innerHTML=`
      <div class="qty-hero"><div class="emo">${a.emoji}</div><div class="nom serif">${a.nom}</div><div class="sub">1 ${a.unite} = ${a.kcal} kcal</div></div>
      <div class="chips">${QTY_CHIPS.map(v=>`<button class="chip ${qte===v?'on':''}" data-v="${v}">${fmt(v)}</button>`).join("")}</div>
      <div class="bigstep"><button id="qm">−</button><div class="v serif">${fmt(qte)} <small>${a.unite}</small></div><button id="qp">＋</button></div>
      <div class="kcalpreview">≈ ${Math.round(a.kcal*qte)} kcal</div>
      <button class="cta" id="qadd">✓ Ajouter</button>`;
    body.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ qte=+c.dataset.v; draw(); });
    document.getElementById("qm").onclick=()=>{ qte=Math.max(0.5,qte-0.5); draw(); };
    document.getElementById("qp").onclick=()=>{ qte+=0.5; draw(); };
    document.getElementById("qadd").onclick=()=>{ addEntry(a,qte); closeSheet(); };
  }
  draw();
}

/* ---- Éditeur d'aliment (création / édition) ---- */
function openEditor(item,fromBank){
  editorState={ item:item?{...item}:{id:null,nom:"",emoji:"🍽️",unite:"portion",cat:"Plats",fav:false,kcal:0,prot:0,gluc:0,lip:0,fib:0}, fromBank, isNew:!item };
  openSheet("editor");
}
function renderEditor(){
  const it=editorState.item;
  document.getElementById("sheetTitle").textContent=editorState.isNew?"Nouvel aliment":"Modifier";
  const body=document.getElementById("sheetBody");
  body.innerHTML=`
    <div class="grid2">
      <div class="field"><label>Nom</label><input id="eNom" value="${esc(it.nom)}" placeholder="ex. Gratin de courgettes"></div>
      <div class="field"><label>Emoji</label><input id="eEmoji" value="${esc(it.emoji)}" placeholder="🍽️"></div>
    </div>
    <div class="field"><label>Unité naturelle (ce que Sandra compte)</label>
      <input id="eUnite" value="${esc(it.unite)}" placeholder="portion, pièce, pot…">
      <div class="unitchips">${UNIT_SUGGEST.map(u=>`<button class="${it.unite===u?'on':''}" data-u="${u}">${u}</button>`).join("")}</div>
    </div>
    <div class="field"><label>Catégorie</label>
      <select id="eCat">${CATS.filter(c=>c!=="Tous").map(c=>`<option ${it.cat===c?'selected':''}>${c}</option>`).join("")}</select>
    </div>
    <div style="font-size:12px;color:var(--inkSoft);margin:4px 0 8px;font-weight:600">Valeurs pour 1 ${it.unite||"unité"} :</div>
    <div class="grid2">
      <div class="field"><label>🔥 kcal</label><input id="eK" type="number" inputmode="numeric" value="${it.kcal||""}"></div>
      <div class="field"><label>💪 Protéines (g)</label><input id="eP" type="number" inputmode="numeric" value="${it.prot||""}"></div>
      <div class="field"><label>🌾 Glucides (g)</label><input id="eG" type="number" inputmode="numeric" value="${it.gluc||""}"></div>
      <div class="field"><label>🥑 Lipides (g)</label><input id="eL" type="number" inputmode="numeric" value="${it.lip||""}"></div>
      <div class="field"><label>🌿 Fibres (g)</label><input id="eF" type="number" inputmode="numeric" value="${it.fib||""}"></div>
    </div>
    <div class="favtoggle" id="eFav"><span>${it.fav?"⭐":"☆"}</span> <span>${it.fav?"Dans les favoris":"Ajouter aux favoris"}</span></div>
    <button class="cta" id="eSave">✓ ${editorState.fromBank?"Enregistrer et ajouter":"Enregistrer"}</button>
    ${!editorState.isNew?`<button class="delbtn" id="eDel">Supprimer cet aliment</button>`:""}`;

  body.querySelectorAll(".unitchips button").forEach(b=>b.onclick=()=>{ document.getElementById("eUnite").value=b.dataset.u; it.unite=b.dataset.u; body.querySelectorAll(".unitchips button").forEach(x=>x.classList.toggle("on",x.dataset.u===b.dataset.u)); });
  document.getElementById("eFav").onclick=()=>{ it.fav=!it.fav; renderEditor(); };
  document.getElementById("eSave").onclick=()=>{
    const nom=document.getElementById("eNom").value.trim();
    if(!nom){ document.getElementById("eNom").focus(); return; }
    const obj={ id:it.id||nid(), nom, emoji:document.getElementById("eEmoji").value.trim()||"🍽️",
      unite:document.getElementById("eUnite").value.trim()||"portion", cat:document.getElementById("eCat").value, fav:it.fav,
      kcal:+document.getElementById("eK").value||0, prot:+document.getElementById("eP").value||0,
      gluc:+document.getElementById("eG").value||0, lip:+document.getElementById("eL").value||0, fib:+document.getElementById("eF").value||0 };
    if(it.id){ bank=bank.map(a=>a.id===it.id?obj:a); }
    else { bank.unshift(obj); }
    if(editorState.fromBank && moment){ addEntry(obj,1); }
    closeSheet(); renderApp();
  };
  const del=document.getElementById("eDel");
  if(del) del.onclick=()=>{ if(confirm("Supprimer cet aliment ?")){ bank=bank.filter(a=>a.id!==it.id); closeSheet(); renderApp(); } };
}

/* ============ GO ============ */
renderApp();
</script>
